name: Python CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  syntax-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile all Python files
        run: |
          python - <<'PY'
          import pathlib
          import py_compile

          for path in pathlib.Path('.').rglob('*.py'):
              py_compile.compile(str(path), doraise=True)
              print(f"OK: {path}")
          PY
